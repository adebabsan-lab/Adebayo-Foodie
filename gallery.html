{% extends 'base.html' %}

{% block content %}

<section class="gallery-header">

    <h1>Food Gallery</h1>

    <p>
        Explore the beauty of authentic Nigerian cuisine
        through our carefully curated collection of dishes.
    </p>

</section>

<section class="gallery-container">

    {% for image in images %}

    <div class="gallery-item">

        <img src="{{ url_for('static',
        filename='images/' + image) }}"
        alt="Nigerian Food">

    </div>

    {% endfor %}

</section>

{% endblock %}
